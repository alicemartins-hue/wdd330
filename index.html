<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Picker</title>
    <meta name="description" content="WDD330 final project">
    <meta name="author" content="Alice Candido Martins">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/popcorn-movie-cinema-svgrepo-com.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    
  </head>
  <body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/popcorn-movie-cinema-svgrepo-com.svg" alt="icon">
            </a>
            <h1>Movie Picker</h1>
        </div>

        <button class="menu-btn" id="menu-btn">
            ☰
        </button>

        <nav id="nav-menu">
            <ul>
                <li><a href="index.html" class="shine">Home</a></li>
                <li><a href="watchlist.html">Watchlist</a></li>
            </ul>
        </nav>
            
    </header>
    
    <main>

        <div id="popcorn-container"></div>
    
        <section class="hero">
            <div class="cursor-glow"></div>
    
            <h2>What should I watch tonight?</h2>
            <div class="hero-search">
                <input type="text" id="searchInput" placeholder="Search a movie...">
                
                <button id="search-bar">
                    Search
                </button>
            </div>

            <section class="random-movie">
            
                <button id="randomMovieBtn">
                    Pick Random Movie
                </button>
            
                <div id="randomMovieContainer"></div>
            
            </section>

            
        </section>

        <section id="hero-search">
            <div id="heroMovie"></div>
        </section>

        <section class="popular-movies">
        
            <h2>Popular Movies</h2>
        
            <div id="popularmovieContainer">
        
            </div>
        
        </section>
    
        <section class="genres">
    
            <h2>Genres</h2>
    
            <div id="genreContainer">
    
            </div>
    
        </section>

        <section id="moviesSection">    
            <div id="movieContainer"></div>
        </section>


    
    </main>    
    <footer>
        <p>Movie Picker</p>
        <p>
            Movie data provided by TMDb and OMDb.
        </p>            
        <p>
            © 2026 Movie Picker | Alice Candido Martins | BYU-Pathway WDD330
        </p>
    </footer>
        
    <div id="movieModal">
    
        <div class="modal-content">
    
            <button class="close-btn">✖</button>
    
            <img class="modal-poster">
    
            <div class="movie-info">
    
                <h2 class="modal-title"></h2>
    
                <p class="modal-description"></p>
    
                <p class="modal-runtime"></p>
    
                <p class="modal-director"></p>
    
                <p class="modal-actors"></p>
    
            </div>
    
        </div>
    
    </div>
        
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
